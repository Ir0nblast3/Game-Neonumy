{% load static %}
<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>SUS Tetris</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="bg-color text-white">

    <div class="d-flex justify-content-center align-items-start">

    <canvas class="bg-dark" id="myCanvas" width="300" height="600"></canvas>

    <div class="d-flex flex-column justify-content-center ms-5">

      <div>
        <h2>Current Score:</h2>
        <p id="score">0</p>
      </div>

      <h3 class="mt-5">Next Piece:</h3>
      <canvas id="pieceCanvas" width="120" height="120"></canvas>

    </div>

    <div class="ms-5">
      <h2>High Scores:</h2>
      <ol id="highScoreList"></ol>
    </div>

    <div id="gameOverScreen" class="hidden">
      <div class="popup">
        <h1>Game Over</h1>
        <p>Score <span id="finalScore"></span></p>

        <input type="text" id="playerName" placeholder="Enter your name" />

        <button id="submitBtn">Submit</button>
        <button id="restartBtn" class="hidden">Play Again</button>
      </div>
    </div>

    </div>

    <script type="module" src="{% static 'js/main.js' %}"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
