{% load static %}
<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>SUS Tetris</title>

    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

  </head>
  <body class="bg-color text-white">
    <div class="container-xxl">
      <div class="d-flex justify-content-between align-items-start">
        <div class="d-flex flex-column justify-content-center h-100">
  
          <div>
            <h2 class="title mb-0">Current Score:</h2>
            <p class="mb-0" id="score">0</p>
          </div>
  
          <h3 class=" text mt-4">Next Piece:</h3>
          <canvas id="pieceCanvas" width="120" height="120"></canvas>

          <div class="title mb-0 mt-5 border border-3 rounded-2 px-3">
            <p class="ctrls mb-0"> W - Rotate piece</p>
            <p class="ctrls mb-0"> A - Move Left</p>
            <p class="ctrls mb-0"> S - Down</p>
            <p class="ctrls mb-0"> D - Move Right</p>
          </div>
  
        </div>

        <canvas class="bg-dark" id="myCanvas" width="300" height="600"></canvas>

        <div>
          <h2 class="title">High Scores:</h2>
          <ol class="text" id="highScoreList"></ol>
        </div>
      </div>

      <div id="gameOverScreen" class="hidden">
        <div class="popup">
          <h1 class="title">Game Over</h1>
          <p class="text">Score <span id="finalScore"></span></p>

          <form id="scoreForm">
            {% csrf_token %}
            <input class="text" type="text" id="playerName" name="player" placeholder="Enter your name" required>
            <button class="button" type="submit" id="submitBtn">Submit</button>
          </form>

          <button class="button hidden" id="restartBtn">
            Play Again
          </button>
        </div>
      </div>

      <div id="pauseMenu" class="hidden">
        <div class="popup">
          <h1 class="title">Pause</h1>
          <button class="button" id="resumeBtn">Resume Game</button>
          <button class="button" id="playAgainBtn">Play Again</button>
        </div>
      </div>
    </div>

    <script type="module" src="{% static 'js/main.js' %}"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
